name: Deploy VPS

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: portfolio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          set -euo pipefail
          : "${VPS_HOST:=${{ secrets.VPS_HOST }}}"
          : "${VPS_USER:=${{ secrets.VPS_USER }}}"
          : "${VPS_PATH:=${{ secrets.VPS_PATH }}}"
          : "${VPS_PORT:=${{ secrets.VPS_PORT }}}"
          : "${VPS_SSH_KEY_B64:=${{ secrets.VPS_SSH_KEY_B64 }}}"

          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_PATH}" ] || [ -z "${VPS_SSH_KEY_B64}" ]; then
            echo "Missing required secrets. Ensure VPS_HOST, VPS_USER, VPS_PATH and VPS_SSH_KEY_B64 are set."
            exit 1
          fi

          if [ -z "${VPS_PORT}" ]; then VPS_PORT="22"; fi

          mkdir -p ~/.ssh
          printf "%s" "${VPS_SSH_KEY_B64}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

          ssh-keygen -lf ~/.ssh/id_ed25519 >/dev/null
          ssh -p "${VPS_PORT}" -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "echo ssh_ok"

      - name: Deploy dist/ to VPS (rsync)
        run: |
          set -euo pipefail
          VPS_HOST="${{ secrets.VPS_HOST }}"
          VPS_USER="${{ secrets.VPS_USER }}"
          VPS_PATH="${{ secrets.VPS_PATH }}"
          VPS_PORT="${{ secrets.VPS_PORT }}"
          if [ -z "${VPS_PORT}" ]; then VPS_PORT="22"; fi

          rsync -az --delete \
            -e "ssh -p ${VPS_PORT} -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            dist/ "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/"

      - name: Reload nginx
        run: |
          set -euo pipefail
          VPS_HOST="${{ secrets.VPS_HOST }}"
          VPS_USER="${{ secrets.VPS_USER }}"
          VPS_PORT="${{ secrets.VPS_PORT }}"
          if [ -z "${VPS_PORT}" ]; then VPS_PORT="22"; fi

          ssh -p "${VPS_PORT}" -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${VPS_USER}@${VPS_HOST}" "sudo nginx -t && sudo systemctl reload nginx"
