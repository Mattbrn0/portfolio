name: Deploy portfolio to VPS

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  deploy:
    environment: portfolio
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Write SSH key file
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ./vps_key
          chmod 600 ./vps_key

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ./vps_key
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm ci || npm install
            npm run build
            sudo nginx -t
            sudo systemctl reload nginx

